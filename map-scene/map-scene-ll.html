<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Mapper | Antigravity</title>
    <style>
      :root {
        --bg-color: #0d1117;
        --text-color: #c9d1d9;
        --accent-color: #58a6ff;
        --border-color: #30363d;
        --panel-bg: #161b22;
        --hover-bg: #21262d;
        --success-color: #238636;
        --warning-bg: #5a4b18; /* Yellow-ish for dark mode */
        --warning-text: #f0e6cc;
        --font-family:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-family);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      /* Overlay for drag & drop indication */
      body.dragging-over::after {
        content: "Drop files here";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(88, 166, 255, 0.2);
        border: 4px dashed var(--accent-color);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: white;
        font-weight: bold;
        pointer-events: none;
      }
      h1 {
        font-weight: 300;
        letter-spacing: -1px;
        margin-bottom: 30px;
        color: var(--accent-color);
      }
      .container {
        width: 100%;
        max-width: 1400px; /* Wider for all columns */
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .drop-zones {
        display: flex;
        gap: 20px;        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .drop-zone {
        flex: 1;
        min-width: 300px;
        height: 150px;
        border: 2px dashed var(--border-color);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: var(--panel-bg);
        transition: all 0.2s ease;
        position: relative;
        cursor: pointer;
      }
      .drop-zone:hover {
        border-color: var(--accent-color);
        background-color: var(--hover-bg);
      }
      .drop-zone.loaded {
        border-color: var(--success-color);
        border-style: solid;
      }
      .drop-zone .icon {
        font-size: 32px;
        margin-bottom: 10px;
        opacity: 0.5;
      }
      .drop-zone .label {
        font-size: 14px;
        font-weight: 500;
      }
      .drop-zone .status {
        font-size: 12px;
        margin-top: 5px;        color: var(--text-color);
        opacity: 0.7;
      }
      .controls {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        justify-content: flex-end;
        position: sticky;
        top: 0px;
        z-index: 100;
        background: var(--bg-color);
        padding: 10px 0;
        border-bottom: 1px solid var(--border-color);
      }
      button {
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: var(--hover-bg);
        border-color: var(--text-color);
      }
      button.primary {
        background-color: var(--success-color);
        color: white;
        border-color: transparent;
      }
      button.primary:hover {
        opacity: 0.9;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background-color: var(--panel-bg);
        color: var(--text-color);
        border-color: var(--border-color);
      }
      .table-container {
        background-color: var(--panel-bg);
        border-radius: 8px;
        border: 1px solid var(--border-color);
        overflow: auto;
        width: 100%;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        min-width: 1000px;
      }
      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
        border-right: 1px solid var(--border-color);
        white-space: pre-wrap; /* Allow wrapping */
      }
      th {
        background-color: #21262d;
        font-weight: 600;
        color: var(--accent-color);
        white-space: nowrap;
        z-index: 10;
      }
      td {
        color: var(--text-color);
      }
      td:focus {
        outline: 2px solid var(--accent-color);
        background-color: var(--hover-bg);
      }
      tr.uncertain {
        background-color: var(--warning-bg);
      }
      tr.uncertain td {
        color: var(--warning-text);
      }
      tr.fixed {
        background-color: rgba(65, 131, 196, 0.2); /* Light blue */
      }
      tr.fixed td {
        color: #8ab4f8;
      }
      tr.mismatch {
        background-color: rgb(0, 66, 0); /* Red-ish for dark mode */
      }
      tr.mismatch td {
        color: #ffcccc;
      }
      .file-input {
        display: none;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: var(--success-color);
        color: white;
        padding: 10px 20px;
        border-radius: 6px;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        z-index: 2000;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>Scene Mapper</h1>

    <div class="container">
      <div class="drop-zones">
        <div class="drop-zone" id="drop-csv" onclick="document.getElementById('file-csv').click()">
          <div class="icon">📄</div>
          <div class="label">Upload Storyboard CSV</div>
          <div class="status" id="status-csv">Drag & Drop or Click</div>
          <input type="file" id="file-csv" class="file-input" accept=".csv" />
        </div>

        <div class="drop-zone" id="drop-json" onclick="document.getElementById('file-json').click()">
          <div class="icon">{}</div>
          <div class="label">Upload Alignment (JSON/TXT)</div>
          <div class="status" id="status-json">Drag & Drop or Click</div>
          <input type="file" id="file-json" class="file-input" accept=".json,.txt" />
        </div>
      </div>

      <div class="controls">
        <button id="btn-process" class="primary" disabled>Process Mapping</button>
        <button id="btn-copy" disabled>Copy TSV</button>
        <button id="btn-download" disabled>Download CSV</button>
      </div>

      <div class="table-container">
        <table id="result-table">
          <thead>
            <tr>
              <th>#</th> </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="5" style="text-align: center; opacity: 0.5; padding: 40px">
                No data processed yet
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="legend" style="margin-top: 15px; font-size: 13px; display: none">
        <span style="display: inline-block; padding: 4px 8px; background: rgba(65, 131, 196, 0.2); color: #8ab4f8; border-radius: 4px; border: 1px solid rgba(138, 180, 248, 0.3); margin-right: 10px;">Tìm được 1 phần của start, cần check lại (90% đúng)</span>
        <span style="display: inline-block; padding: 4px 8px; background: var(--warning-bg); color: var(--warning-text); border-radius: 4px; border: 1px solid rgba(240, 230, 204, 0.3); margin-right: 10px;">Không tìm được start, bạn phải map tay</span>
        <span style="display: inline-block; padding: 4px 8px; background: rgb(0, 66, 0); color: #ffcccc; border-radius: 4px; border: 1px solid rgba(255, 204, 204, 0.3);">Tìm được start, đã sửa về đúng với json</span>
      </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
      // Store loaded data
      let csvData = null;
      let alignmentData = null; // Standardized list of { start: number, word: string }
      let csvHeaders = [];
      let mappedResults = [];

      // UI Elements
      const dropCsv = document.getElementById("drop-csv");
      const dropJson = document.getElementById("drop-json");
      const statusCsv = document.getElementById("status-csv");
      const statusJson = document.getElementById("status-json");
      const btnProcess = document.getElementById("btn-process");
      const btnCopy = document.getElementById("btn-copy");
      const btnDownload = document.getElementById("btn-download");
      const tableHead = document.querySelector("#result-table thead tr");
      const tableBody = document.querySelector("#result-table tbody");
      const toast = document.getElementById("toast");

      // Global Drag & Drop functionality
      window.addEventListener("dragenter", preventDefaults, false);
      window.addEventListener("dragover", (e) => {
          preventDefaults(e);
          document.body.classList.add("dragging-over");
      }, false);

      window.addEventListener("dragleave", (e) => {
          preventDefaults(e);
          if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
            document.body.classList.remove("dragging-over");
          }
      }, false);

      window.addEventListener("drop", (e) => {
          preventDefaults(e);
          document.body.classList.remove("dragging-over");
          handleFiles(e.dataTransfer.files);
      }, false);

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      document.getElementById("file-csv").addEventListener("change", (e) => handleFiles(e.target.files));
      document.getElementById("file-json").addEventListener("change", (e) => handleFiles(e.target.files));

      function handleFiles(files) {
        Array.from(files).forEach((file) => {
          const name = file.name.toLowerCase();
          if (name.endsWith(".csv")) {
            processFile(file, "csv");
          } else if (name.endsWith(".json") || name.endsWith(".txt")) {
            processFile(file, "alignment");
          } else {
            console.log("Skipping unknown file type:", name);
          }
        });
      }

      function processFile(file, type) {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            if (type === "csv") {
              const parsed = parseCSV(e.target.result);
              csvData = parsed.data;
              csvHeaders = parsed.headers;
              statusCsv.innerText = `Loaded: ${file.name} (${csvData.length} rows)`;
              dropCsv.classList.add("loaded");
            } else {
              // Handle Alignment File (JSON/TXT)
              const result = parseAlignmentFile(e.target.result, file.name);
              alignmentData = result;
              statusJson.innerText = `Loaded: ${file.name}`;
              dropJson.classList.add("loaded");
            }
            checkReady();
          } catch (err) {
            alert(`Error parsing ${type.toUpperCase()}: ` + err.message);
          }
        };
        reader.readAsText(file);
      }

      function parseAlignmentFile(content, filename) {
        // Mode 1: Timestamped Text
        const timestampedRegex = /^\[(\d+(?:\.\d+)?)\]:\s*(.+)$/;
        const lines = content.split(/\r?\n/);
        const textMatches = lines.map((line) => line.match(timestampedRegex)).filter((m) => m);

        if (textMatches.length > 0) {
          console.log("Detected Timestamped Text format");
          const tokens = [];
          textMatches.forEach((m) => {
            const time = parseFloat(m[1]);
            const text = m[2];
            const words = text.trim().split(/\s+/).filter((w) => w);
            if (words.length > 0) {
              tokens.push({ word: words[0], start: time, end: time + 0.1 }); 
              for (let i = 1; i < words.length; i++) {
                tokens.push({ word: words[i], start: time + 0.1, end: time + 0.1 });
              }
            }
          });
          return tokens;
        }

        // Mode 2: JSON
        let json;
        try {
          json = JSON.parse(content);
        } catch (e) {
          throw new Error("Invalid Alignment file format (not TXT or JSON)");
        }

        // Case 2a: Original standard format { segments: [{ words: [...] }] }
        if (json.segments) {
          console.log("Detected Standard JSON format");
          const allWords = [];
          json.segments.forEach((seg) => {
            if (seg.words) {
              seg.words.forEach((w) => allWords.push(w));
            }
          });
          return allWords;
        }

        // Case 2c (FIXED): New Array-Wrapped JSON format processing ALL segments
        if (
          Array.isArray(json) &&
          json.length > 0 &&
          json[0].words &&
          Array.isArray(json[0].words)
        ) {
          console.log("Detected New Array-Wrapped JSON format");
          const tokens = [];
          // FIX: Loop qua toàn bộ mảng thay vì chỉ json[0]
          json.forEach((segment) => {
            if (segment.words && Array.isArray(segment.words)) {
              segment.words.forEach((w) => {
                if (w.type === "word" || !w.type) {
                  tokens.push({
                    word: w.text || w.word,
                    start: parseFloat(w.start),
                    end: parseFloat(w.end),
                  });
                }
              });
            }
          });
          return tokens;
        }

        // Case 2b: Simple flat JSON [{ start: 0, text: "foo" }, ...]
        if (Array.isArray(json) && json.length > 0 && typeof json[0] === "object") {
          console.log("Detected Simple Flat JSON format");
          const tokens = [];
          json.forEach((item) => {
            const time = item.start !== undefined ? item.start : item.time;
            const text = item.text || item.content || item.word;

            if (time !== undefined && text) {
              const words = text.toString().trim().split(/\s+/).filter((w) => w);
              if (words.length > 0) {
                tokens.push({ word: words[0], start: parseFloat(time), end: parseFloat(time) });
                for (let i = 1; i < words.length; i++) {
                  tokens.push({ word: words[i], start: parseFloat(time), end: parseFloat(time) });
                }
              }
            }
          });
          return tokens;
        }

        console.warn("Unknown JSON structure, attempting best effort or empty");
        return [];
      }

      function checkReady() {
        if (csvData && alignmentData) {
          btnProcess.disabled = false;
        }
      }

      function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentCell = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const nextChar = text[i + 1];

          if (inQuotes) {
            if (char === '"' && nextChar === '"') {
              currentCell += '"';
              i++;
            } else if (char === '"') {
              inQuotes = false;
            } else {
              currentCell += char;
            }
          } else {
            if (char === '"') {
              inQuotes = true;
            } else if (char === ",") {
              currentRow.push(currentCell.trim());
              currentCell = "";
            } else if (char === "\n" || char === "\r") {
              if (currentCell || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
              }
              currentRow = [];
              currentCell = "";
              if (char === "\r" && nextChar === "\n") i++;
            } else {
              currentCell += char;
            }
          }
        }
        if (currentCell || currentRow.length > 0) {
          currentRow.push(currentCell.trim());
          rows.push(currentRow);
        }

        if (rows.length === 0) return { headers: [], data: [] };

        const nonEmptyRows = rows.filter((row) => row.some((cell) => cell.length > 0));
        if (nonEmptyRows.length === 0) return { headers: [], data: [] };

        let headers = nonEmptyRows[0].map((h) => h.trim());
        const sceneColIndex = headers.findIndex((h) => /sc(?:r)?ene\s*idx/i.test(h));
        let dataRows = nonEmptyRows.slice(1);
        
        if (sceneColIndex !== -1) {
          dataRows = dataRows.filter((r) => r[sceneColIndex] && r[sceneColIndex].trim().length > 0);
        }

        const promptIndex = headers.findIndex(
          (h) => h.toLowerCase() === "video motion prompt".toLowerCase(),
        );

        let validIndices = [];
        if (promptIndex !== -1) {
          validIndices = headers.map((_, i) => i).slice(0, promptIndex + 1);
          headers = headers.slice(0, promptIndex + 1);
        } else {
          validIndices = headers.map((_, i) => i);
        }

        ["Start (ms)", "End (ms)", "Length (ms)"].forEach((col) => {
          if (!headers.includes(col)) headers.push(col);
        });

        const data = dataRows.map((row) => {
          const obj = {};
          validIndices.forEach((originalIndex, newIndex) => {
            obj[headers[newIndex]] = row[originalIndex] || "";
          });
          ["Start (ms)", "End (ms)", "Length (ms)"].forEach((col) => {
            if (!obj[col]) obj[col] = "";
          });
          return obj;
        });

        return { headers, data };
      }

      btnProcess.addEventListener("click", () => {
        if (!csvData || !alignmentData) return;

        const allWords = alignmentData;

        // FIX: Xử lý chuẩn Unicode để không mất ký tự có dấu (á, é, ó...)
        const cleanToken = (str) => {
          if (!str) return "";
          return str
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") // Loại bỏ các dấu sau khi phân rã Unicode
            .replace(/[^a-zA-Z0-9]/g, "") // Chỉ giữ lại chữ cái và số
            .toLowerCase();
        };

        const tokenize = (str) => {
          if (!str) return [];
          return str
            .replace(/\.\.\./g, " ")
            .replace(/-/g, " ")
            .split(/\s+/) // Cắt theo khoảng trắng
            .map((w) => cleanToken(w))
            .filter((w) => w.length > 0);
        };

        // Build stringified sequence
        let fullCleanText = "";
        const wordOffsets = [];

        allWords.forEach((item, index) => {
          const cw = cleanToken(item.word);
          if (cw.length > 0) {
            wordOffsets.push({
              wordIndex: index,
              charStart: fullCleanText.length,
              charEnd: fullCleanText.length + cw.length,
              wordStart: item.start,
            });
            fullCleanText += cw;
          }
        });

        const results = [];
        let lastCharIndex = 0;

        const startSentenceHeaderIdx = csvHeaders.findIndex((h) => /start\s+sentence/i.test(h));
        const startSentenceHeader =
          startSentenceHeaderIdx !== -1 ? csvHeaders[startSentenceHeaderIdx] : "Start Sentence";

        for (let i = 0; i < csvData.length; i++) {
          const row = csvData[i];
          const startSentence = row[startSentenceHeader];

          let foundIndex = -1;
          let isUncertain = false;
          let isMismatched = false;

          if (startSentence) {
            const parts = startSentence
              .split(/\.\.\./)
              .map((p) => p.trim())
              .filter((p) => p.length > 0);

            if (parts.length > 0) {
              const firstClean = cleanToken(parts[0]);
              if (firstClean.length > 0) {
                let searchIdx = fullCleanText.indexOf(firstClean, lastCharIndex);
                while (searchIdx !== -1) {
                  let currentIdx = searchIdx + firstClean.length;
                  let valid = true;

                  for (let p = 1; p < parts.length; p++) {
                    const partClean = cleanToken(parts[p]);
                    if (partClean.length === 0) continue;
                    const nextIdx = fullCleanText.indexOf(partClean, currentIdx);
                    if (nextIdx !== -1) {
                      currentIdx = nextIdx + partClean.length;
                    } else {
                      valid = false;
                      break;
                    }
                  }

                  if (valid) {
                    foundIndex = searchIdx;
                    break;
                  }
                  searchIdx = fullCleanText.indexOf(firstClean, searchIdx + 1);
                }
              }
            }
          }

          if (foundIndex !== -1) {
            let matchedWord = null;
            for (let wo of wordOffsets) {
              if (wo.charEnd > foundIndex && wo.charStart <= foundIndex) {
                matchedWord = wo;
                break;
              }
            }
            if (matchedWord) {
              row._mappedStart = matchedWord.wordStart;
            } else {
              row._mappedStart = null;
            }

            lastCharIndex = foundIndex + 1;

            let csvStartSeconds = null;
            if (row["Start (ms)"] && row["Start (ms)"].trim() !== "") {
              const ms = parseFloat(row["Start (ms)"]);
              if (!isNaN(ms)) {
                csvStartSeconds = ms / 1000.0;
              }
            } else if (row["Start"] && row["Start"].trim() !== "") {
              const s = parseFloat(row["Start"]);
              if (!isNaN(s)) {
                csvStartSeconds = s;
              }
            }

            if (csvStartSeconds !== null) {
              const diff = Math.abs(csvStartSeconds - row._mappedStart);
              if (diff > 0.1) {
                isMismatched = true;
              }
            }
          } else {
            row._mappedStart = null;
            if (startSentence) {
              isUncertain = true; 
            }
          }

          row._isUncertain = isUncertain;
          row._isMismatched = isMismatched;
          results.push(row);
        }

        // Second pass: fallback mapping for uncertain rows using >= 3 words within time bounds
        const totalDuration = allWords.length > 0 ? allWords[allWords.length - 1].end : 0;

        for (let i = 0; i < results.length; i++) {
          const row = results[i];
          if (row._isUncertain && row._mappedStart === null) {
            const startSentence = row[startSentenceHeader];
            if (startSentence) {
              let prevTime = 0;
              for (let k = i - 1; k >= 0; k--) {
                if (results[k]._mappedStart !== null) {
                  prevTime = results[k]._mappedStart;
                  break;
                }
              }

              let nextTime = totalDuration;
              for (let k = i + 1; k < results.length; k++) {
                if (results[k]._mappedStart !== null) {
                  nextTime = results[k]._mappedStart;
                  break;
                }
              }

              const allTokens = tokenize(startSentence);
              let foundCharIdx = -1;
              let bestMatchLength = 0;

              for (let len = allTokens.length; len >= 3; len--) {
                const searchStr = allTokens.slice(0, len).join("");

                let searchIdx = fullCleanText.indexOf(searchStr);
                let possibleMatches = [];

                while (searchIdx !== -1) {
                  let matchedWord = null;
                  for (let wo of wordOffsets) {
                    if (wo.charEnd > searchIdx && wo.charStart <= searchIdx) {
                      matchedWord = wo;
                      break;
                    }
                  }

                  if (matchedWord) {
                    const wordTime = matchedWord.wordStart;
                    if (wordTime > prevTime && wordTime < nextTime) {
                      possibleMatches.push(matchedWord);
                    }
                  }

                  searchIdx = fullCleanText.indexOf(searchStr, searchIdx + 1);
                }

                if (possibleMatches.length > 0) {
                  foundCharIdx = possibleMatches[0].charStart;
                  row._mappedStart = possibleMatches[0].wordStart;
                  bestMatchLength = len;
                  break;
                }
              }

              if (foundCharIdx !== -1) {
                row._isUncertain = false;
                row._isFixed = true;

                const matchLen = bestMatchLength;
                const matchedWords = allTokens.slice(0, matchLen);

                try {
                  const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                  const regexParts = matchedWords.map((w) => escapeRegExp(w));
                  const searchRegExp = new RegExp(
                    "(" + regexParts.join("[\\s\\p{P}]+") + ")",
                    "iu",
                  );

                  row._boldedSentence = startSentence.replace(searchRegExp, "<b>$1</b>");
                } catch (e) {
                  row._boldedSentence = startSentence;
                }

                let csvStartSeconds = null;
                if (row["Start (ms)"] && row["Start (ms)"].trim() !== "") {
                  const ms = parseFloat(row["Start (ms)"]);
                  if (!isNaN(ms)) csvStartSeconds = ms / 1000.0;
                } else if (row["Start"] && row["Start"].trim() !== "") {
                  const s = parseFloat(row["Start"]);
                  if (!isNaN(s)) csvStartSeconds = s;
                }

                if (csvStartSeconds !== null) {
                  const diff = Math.abs(csvStartSeconds - row._mappedStart);
                  row._isMismatched = diff > 0.1;
                } else {
                  row._isMismatched = false;
                }
              }
            }
          }
        }

        for (let i = 0; i < results.length; i++) {
          if (results[i]._mappedStart !== null) {
            results[i]["Start (ms)"] = Math.round(results[i]._mappedStart * 1000);
          }
        }

        if (results.length > 0) {
          results[0]["Start (ms)"] = 0;
        }

        const totalDurationMs = Math.round(totalDuration * 1000);

        for (let i = 0; i < results.length; i++) {
          const row = results[i];

          let nextStartMs = null;
          for (let k = i + 1; k < results.length; k++) {
            let sMs = parseInt(results[k]["Start (ms)"]);
            if (!isNaN(sMs)) {
              nextStartMs = sMs;
              break;
            }
          }

          if (nextStartMs === null) {
            nextStartMs = totalDurationMs;
          }

          row["End (ms)"] = nextStartMs;

          let currentStartMs = parseInt(row["Start (ms)"]);
          if (!isNaN(currentStartMs)) {
            row["Length (ms)"] = nextStartMs - currentStartMs;
          } else {
            row["Length (ms)"] = "";
          }
        }

        mappedResults = results;
        document.querySelector(".legend").style.display = "block";
        renderTable(results);
        btnCopy.disabled = false;
        btnDownload.disabled = false;
        showToast("Mapping Complete!", "success");
      });

      function recalculateTimes(data) {
        let totalDurationMs = 0;
        if (alignmentData && alignmentData.length > 0) {
          totalDurationMs = Math.round(alignmentData[alignmentData.length - 1].end * 1000);
        }

        for (let i = 0; i < data.length; i++) {
          const row = data[i];

          let nextStartMs = null;
          for (let k = i + 1; k < data.length; k++) {
            let sMs = parseInt(data[k]["Start (ms)"]);
            if (!isNaN(sMs)) {
              nextStartMs = sMs;
              break;
            }
          }

          if (nextStartMs === null) {
            nextStartMs = totalDurationMs;
          }

          row["End (ms)"] = nextStartMs;

          let currentStartMs = parseInt(row["Start (ms)"]);
          if (!isNaN(currentStartMs)) {
            row["Length (ms)"] = nextStartMs - currentStartMs;
          } else {
            row["Length (ms)"] = "";
          }
        }
      }

      function updateTableTimeCells() {
        const rows = tableBody.querySelectorAll("tr");
        const startIdx = csvHeaders.indexOf("Start (ms)");
        const endIdx = csvHeaders.indexOf("End (ms)");
        const lenIdx = csvHeaders.indexOf("Length (ms)");

        if (startIdx === -1) return;

        rows.forEach((tr, index) => {
          const cells = tr.querySelectorAll("td");
          const dataRow = mappedResults[index];
          if (endIdx !== -1 && cells[endIdx + 1]) {
            cells[endIdx + 1].innerText = dataRow["End (ms)"];
          }
          if (lenIdx !== -1 && cells[lenIdx + 1]) {
            cells[lenIdx + 1].innerText = dataRow["Length (ms)"];
          }
        });
      }

      function renderTable(data) {
        const startSentenceHeaderIdx = csvHeaders.findIndex((h) => /start\s+sentence/i.test(h));
        const startSentenceHeader =
          startSentenceHeaderIdx !== -1 ? csvHeaders[startSentenceHeaderIdx] : "Start Sentence";

        tableHead.innerHTML = "<th>#</th>";
        csvHeaders.forEach((h) => {
          const th = document.createElement("th");
          th.innerText = h;
          tableHead.appendChild(th);
        });

        tableBody.innerHTML = "";
        data.forEach((row, index) => {
          const tr = document.createElement("tr");
          if (row._isUncertain) {
            tr.classList.add("uncertain");
          } else if (row._isFixed) {
            tr.classList.add("fixed");
          }
          if (row._isMismatched) {
            tr.classList.add("mismatch");
          }

          const tdNum = document.createElement("td");
          tdNum.innerText = index + 1;
          tr.appendChild(tdNum);

          csvHeaders.forEach((key) => {
            const td = document.createElement("td");

            if (key === "Start (ms)" || key === "Start") {
              td.contentEditable = true;
              td.addEventListener("input", (e) => {
                let text = e.target.innerText.trim();
                row[key] = text === "" ? "" : parseInt(text);
                if (isNaN(row[key]) && text !== "") row[key] = text; 
                recalculateTimes(mappedResults);
                updateTableTimeCells();
              });
            } else {
              td.contentEditable = false;
            }

            if (row._isFixed && key === startSentenceHeader && row._boldedSentence) {
              td.innerHTML = row._boldedSentence;
            } else {
              td.innerText = row[key] !== undefined ? row[key] : "";
            }

            tr.appendChild(td);
          });

          tableBody.appendChild(tr);
        });
      }

      function getTableData() {
        const rows = Array.from(tableBody.querySelectorAll("tr"));
        return rows.map((tr) => {
          const cells = Array.from(tr.querySelectorAll("td"));
          const dataCells = cells.slice(1);
          const obj = {};
          csvHeaders.forEach((h, i) => {
            obj[h] = dataCells[i] ? dataCells[i].innerText.trim() : "";
          });
          return obj;
        });
      }

      function toSV(data, delimiter) {
        if (!data || data.length === 0) return "";
        const headers = csvHeaders;

        const escape = (val) => {
          const str = String(val);
          if (str.includes(delimiter) || str.includes("\n") || str.includes('"')) {
            return `"${str.replace(/"/g, '""')}"`;
          }
          return str;
        };

        const headerRow = headers.map((h) => escape(h)).join(delimiter);
        const contentRows = data.map((row) => {
          return headers.map((h) => escape(row[h] || "")).join(delimiter);
        });

        return [headerRow, ...contentRows].join("\n");
      }

      btnDownload.addEventListener("click", () => {
        const currentData = getTableData();
        const csvStr = toSV(currentData, ",");
        const blob = new Blob([csvStr], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "mapped_scenes.csv";
        a.click();
        URL.revokeObjectURL(url);
      });

      btnCopy.addEventListener("click", () => {
        const currentData = getTableData();
        const tsvStr = toSV(currentData, "\t");
        navigator.clipboard.writeText(tsvStr);
        showToast("Copied TSV to clipboard!");
      });

      function showToast(msg, type = "success") {
        toast.innerText = msg;
        toast.style.backgroundColor =
          type === "success" ? "var(--success-color)" : "var(--warning-bg)";
        toast.style.color = type === "success" ? "white" : "white";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }
    </script>
  </body>
</html>
